{% extends "base.html" %}

{% block content %}

<div class="auth-page">
    <div class="auth-card">

        <div style="text-align: center; margin-bottom: 28px;">
            <div class="auth-icon">👤</div>
            <h1 class="auth-title">Criar conta</h1>
            <p class="auth-sub">Preencha os dados abaixo para começar</p>
        </div>

        <form method="POST">

            <label class="tf-label">Nome</label>
            <input type="text" name="name" class="tf-input" placeholder="Seu nome completo" required>

            <label class="tf-label">E-mail</label>
            <input type="email" name="email" class="tf-input" placeholder="seu@email.com" required>

            <label class="tf-label">Senha</label>
            <input type="password" name="password" class="tf-input" placeholder="••••••••" required>

            <button type="submit" class="tf-btn-primary">Cadastrar</button>

        </form>

        <p class="auth-footer">
            Já tem uma conta?
            <a href="{{ url_for('main.login') }}">Fazer login</a>
        </p>

    </div>
</div>

{% endblock %}
