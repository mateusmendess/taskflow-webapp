{% extends "base.html" %}

{% block content %}

<div class="auth-page">
    <div class="auth-card">

        <div style="text-align: center; margin-bottom: 28px;">
            <div class="auth-icon">✓</div>
            <h1 class="auth-title">Bem-vindo de volta</h1>
            <p class="auth-sub">Entre na sua conta para continuar</p>
        </div>

        <form method="POST" action="/login">

            <label class="tf-label">E-mail</label>
            <input type="email" name="email" class="tf-input" placeholder="seu@email.com" required>

            <label class="tf-label">Senha</label>
            <input type="password" name="password" class="tf-input" placeholder="••••••••" required>

            <button type="submit" class="tf-btn-primary">Entrar</button>

        </form>

        <p class="auth-footer">
            Não tem uma conta?
            <a href="{{ url_for('main.register') }}">Criar conta grátis</a>
        </p>

    </div>
</div>

{% endblock %}
