{% extends "base.html" %}

{% block content %}

<section class="home-page">

    <div class="hero">

        <h1>Bem-vindo ao TaskFlow 🚀</h1>

        <p>
            Gerencie atividades, prioridades e prazos
            de forma simples, rápida e moderna.
        </p>

        <div class="buttons">

            {% if current_user.is_authenticated %}

                <a
                    href="{{ url_for('main.dashboard') }}"
                    class="btn primary"
                >
                    Ir para Dashboard
                </a>

                <a
                    href="{{ url_for('main.logout') }}"
                    class="btn secondary"
                >
                    Fazer Logout
                </a>

            {% else %}

                <a
                    href="{{ url_for('main.register') }}"
                    class="btn primary"
                >
                    Começar Agora
                </a>

                <a
                    href="{{ url_for('main.login') }}"
                    class="btn secondary"
                >
                    Fazer Login
                </a>

            {% endif %}

        </div>

    </div>

</section>

{% endblock %}
